<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>3D 檢視器 - 淺色背景</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #eeeeee; } /* 換成淺灰色背景 */
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: #333; font-family: sans-serif; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="info">正在載入模型...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. 基本場景設定
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdddddd); // 設定場景背景為淺灰色

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. 強化光源設定
        // 增加環境光亮度，確保黑色材質也有基本的反光
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
        scene.add(ambientLight);

        // 強度設為 2.0
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2.0);
        scene.add(hemiLight);

        // 設定多個方向燈，消除死角
        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(10, 10, 10);
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0xffffff, 0.8);
        light2.position.set(-10, 5, -10);
        scene.add(light2);

        const controls = new OrbitControls(camera, renderer.domElement);

        // 3. 檔案路徑
        const mtlUrl = 'https://raw.githubusercontent.com/abbagodxyz-creator/microlab/refs/heads/main/G28-LMSN(P.47).mtl';
        const objUrl = 'https://raw.githubusercontent.com/abbagodxyz-creator/microlab/refs/heads/main/G28-LMSN(P.47).obj';

        // 4. 執行載入
        const mtlLoader = new MTLLoader();
        mtlLoader.setCrossOrigin('anonymous'); 

        mtlLoader.load(mtlUrl, (materials) => {
            materials.preload();
            
            const objLoader = new OBJLoader();
            objLoader.setMaterials(materials);
            
            objLoader.load(objUrl, (object) => {
                scene.add(object);

                // 自動置中與縮放
                const box = new THREE.Box3().setFromObject(object);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);

                object.position.sub(center); 
                camera.position.set(0, maxDim * 0.5, maxDim * 1.5);
                controls.update();

                document.getElementById('info').innerText = "內藏式內徑研磨主軸 G28-LMSN";
            }, undefined, (err) => {
                console.error('模型錯誤', err);
            });

        }, undefined, (err) => {
            console.error('材質錯誤', err);
            document.getElementById('info').innerText = "材質載入失敗";
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
